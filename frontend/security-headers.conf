# Included into every location block that sets its own add_header —
# nginx's add_header does NOT inherit into a child context that defines any
# add_header of its own, so these have to be repeated per-location rather
# than declared once at the server level.
add_header X-Content-Type-Options nosniff always;
add_header X-Frame-Options SAMEORIGIN always;
add_header Referrer-Policy strict-origin-when-cross-origin always;
