server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    include /etc/nginx/security-headers.conf;

    # SPA: any path that isn't a real file falls back to index.html so
    # React Router's client-side routes (e.g. /batteries/123) work on a
    # hard refresh, same as the rewrite rule in vercel.json.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the app shell — it must always be fetched fresh so it
    # picks up new hashed asset filenames after a deploy. Without this, a
    # cached stale index.html can reference assets that no longer exist.
    # (add_header doesn't inherit into a location that sets its own, hence
    # the repeated include — see security-headers.conf.)
    location = /index.html {
        add_header Cache-Control "no-cache";
        include /etc/nginx/security-headers.conf;
    }

    # Vite content-hashes every filename under /assets/, so it's always
    # safe to cache these forever — a new build gets new filenames.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/security-headers.conf;
    }
}
